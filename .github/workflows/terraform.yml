name: 'Terraform CI/CD'

on:
  push:
    branches:
    - main
  pull_request:

jobs:
  terraform-validate:
    name: 'Terraform Core Validation'
    runs-on: ubuntu-latest
    # Using the official Terraform Docker image for execution
    container:
      image: hashicorp/terraform:latest
    
    steps:
    - name: Install Git
      run: apk add --no-cache git bash

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Terraform Format Check
      run: terraform fmt -check -recursive
      continue-on-error: true

    - name: Meaningful Terraform Init & Validate Loop
      run: |
        #!/bin/bash
        set -e
        # Find all directories that contain a main.tf file and validate them
        echo "Starting recursive Terraform validation..."
        
        for dir in environments/*/* modules/*; do
          if [ -d "$dir" ] && [ -f "$dir/main.tf" ]; then
            echo "--------------------------------------------------------"
            echo "Validating Terraform configuration in: $dir"
            echo "--------------------------------------------------------"
            cd "$dir"
            
            # Initialize without backend to speed up checks and avoid credential errors
            terraform init -backend=false -upgrade
            
            # Validate syntactical correctness and provider compatibility
            if terraform validate; then
              echo "$dir is valid."
            else
              echo "Validation failed for $dir"
              exit 1
            fi
            cd - > /dev/null
          fi
        done

  security-scan:
    name: 'Continuous Security Scan'
    runs-on: ubuntu-latest
    needs: terraform-validate
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Checkov Static Analysis
      uses: bridgecrewio/checkov-action@v12
      with:
        directory: .
        framework: terraform
        # Example to avoid crashing on missing GCP keys in CI.
        # Add actual CKV codes to skip here if necessary.
        skip_check: CKV_GCP_49,CKV_GCP_38,CKV_GCP_37,CKV_GCP_62
